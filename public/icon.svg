<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Deep Burgundy / Maroon Radial Background -->
    <radialGradient id="bg-grad" cx="50%" cy="45%" r="70%" fx="50%" fy="45%">
      <stop offset="0%" stop-color="#540a18" />
      <stop offset="55%" stop-color="#2a040b" />
      <stop offset="100%" stop-color="#140104" />
    </radialGradient>

    <!-- Metallic Gold Gradient -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff4b8" />
      <stop offset="25%" stop-color="#ffd700" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="75%" stop-color="#d97706" />
      <stop offset="100%" stop-color="#8c3b00" />
    </linearGradient>

    <!-- Light Gold Reflection -->
    <linearGradient id="gold-light" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="50%" stop-color="#fef08a" />
      <stop offset="100%" stop-color="#ffffff" />
    </linearGradient>

    <!-- Ruby Diamond Gradients -->
    <linearGradient id="ruby-top" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff4d6d" />
      <stop offset="100%" stop-color="#e60026" />
    </linearGradient>
    <linearGradient id="ruby-left" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff1a40" />
      <stop offset="100%" stop-color="#99001a" />
    </linearGradient>
    <linearGradient id="ruby-right" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b3001e" />
      <stop offset="100%" stop-color="#4d000c" />
    </linearGradient>
    <linearGradient id="ruby-center" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ff8099" />
      <stop offset="30%" stop-color="#ff0033" />
      <stop offset="100%" stop-color="#80001a" />
    </linearGradient>

    <!-- Glow filters -->
    <filter id="diamond-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="gold-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background Rect -->
  <rect width="512" height="512" rx="112" fill="url(#bg-grad)" />
  <rect x="8" y="8" width="496" height="496" rx="104" stroke="url(#gold-grad)" stroke-width="4" stroke-opacity="0.3" />
  
  <!-- Subtle Ambient Glow behind DWM -->
  <circle cx="256" cy="210" r="140" fill="#e60026" opacity="0.12" filter="blur(40px)" />
  <circle cx="256" cy="200" r="110" fill="#ffd700" opacity="0.08" filter="blur(30px)" />

  <!-- D W M Monogram Group with Shadow -->
  <g filter="url(#gold-shadow)">
    <!-- Letter D (Left) -->
    <path d="M 52 100 L 165 100 C 220 100 250 135 250 185 C 250 235 220 270 165 270 L 52 270 L 92 185 L 52 100 Z M 112 145 L 98 225 L 155 225 C 180 225 195 210 195 185 C 195 160 180 145 155 145 L 112 145 Z" fill="url(#gold-grad)" />
    <path d="M 52 100 L 165 100 C 220 100 250 135 250 185 C 250 188 249 191 248 194 C 245 145 215 110 165 110 L 62 110 L 52 100 Z" fill="url(#gold-light)" opacity="0.7"/>

    <!-- Letter W (Center/Left interlocking) -->
    <path d="M 175 100 L 210 270 L 256 160 L 302 270 L 337 100 L 295 100 L 278 200 L 256 130 L 234 200 L 217 100 Z" fill="url(#gold-grad)" />
    <path d="M 175 100 L 195 100 L 210 180 L 217 100 L 234 100 L 256 130 L 246 130 L 228 105 L 213 190 L 175 100 Z" fill="url(#gold-light)" opacity="0.6"/>

    <!-- Letter M (Right) -->
    <path d="M 290 270 L 325 100 L 375 220 L 425 100 L 460 270 L 415 270 L 400 170 L 375 250 L 350 170 L 335 270 Z" fill="url(#gold-grad)" />
    <path d="M 425 100 L 460 270 L 450 270 L 418 115 L 375 230 L 332 115 L 325 100 L 340 100 L 375 210 L 410 100 L 425 100 Z" fill="url(#gold-light)" opacity="0.5"/>
  </g>

  <!-- Ruby Red Diamond (Center Jewel) -->
  <g filter="url(#diamond-glow)">
    <circle cx="256" cy="240" r="35" fill="#ff0033" opacity="0.4" />
  </g>
  <g filter="url(#gold-shadow)">
    <!-- Diamond Table (Top flat center) -->
    <polygon points="230,215 282,215 268,200 244,200" fill="url(#ruby-top)" stroke="#ff8099" stroke-width="1" />
    <!-- Top Left Crown -->
    <polygon points="214,215 230,215 244,200 224,200" fill="#ff3355" />
    <!-- Top Right Crown -->
    <polygon points="282,215 298,215 288,200 268,200" fill="#cc0022" />
    <!-- Center Pavilion (Bottom Main) -->
    <polygon points="230,215 282,215 256,275" fill="url(#ruby-center)" stroke="#ff4d6d" stroke-width="0.8" />
    <!-- Left Pavilion -->
    <polygon points="214,215 230,215 256,275" fill="url(#ruby-left)" />
    <!-- Right Pavilion -->
    <polygon points="282,215 298,215 256,275" fill="url(#ruby-right)" />
    <!-- Sparkling Highlights -->
    <polygon points="244,200 268,200 256,192" fill="#ffccd6" />
    <circle cx="240" cy="220" r="2.5" fill="#ffffff" opacity="0.9" />
    <circle cx="256" cy="272" r="1.5" fill="#ff8099" />
  </g>

  <!-- DANCE WITH ME Typography -->
  <g filter="url(#gold-shadow)">
    <!-- Main Futuristic Text -->
    <text x="256" y="355" font-family="'Space Grotesk', 'Outfit', 'Arial Black', sans-serif" font-size="34" font-weight="900" letter-spacing="5" text-anchor="middle" fill="url(#gold-grad)" stroke="#662200" stroke-width="0.5">DANCE WITH ME</text>
    
    <!-- Thin Decorative Gold Line Below Title -->
    <line x1="130" y1="375" x2="382" y2="375" stroke="url(#gold-grad)" stroke-width="2" stroke-linecap="round" opacity="0.8" />
    <circle cx="256" cy="375" r="4" fill="#ff0033" />
    
    <!-- Events Organizer Subtitle -->
    <text x="256" y="420" font-family="'Inter', 'Segoe UI', sans-serif" font-size="26" font-weight="600" letter-spacing="1.5" text-anchor="middle" fill="#fde08d" opacity="0.95">Events organizer</text>
  </g>
</svg>
